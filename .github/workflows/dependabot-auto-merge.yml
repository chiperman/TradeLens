name: Dependabot Auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for GitHub Actions and Dev Tooling
        # 自动合并逻辑：
        # 1. 属于 github-actions-suite 组的所有更新
        # 2. 属于 dev-tooling 组的 patch 和 minor 更新
        if: >-
          steps.metadata.outputs.dependency-group == 'github-actions-suite' ||
          (steps.metadata.outputs.dependency-group == 'dev-tooling' &&
           (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'))
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
